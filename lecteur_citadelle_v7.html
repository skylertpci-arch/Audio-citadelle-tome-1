{"type": "text", "body": "Idriss Aberkane (né en 1986) Essayiste et conférencier, Aberkane intervient ici dans le champ de la cognition, de la créativité et de la circulation des"},
{"type": "text", "body": "l'intelligence humaine face aux systèmes computationnels."},
{"type": "text", "body": "Éric Sadin (né en 1973) Penseur critique des logiques algorithmiques et de la gouvernementalité numérique."},
{"type": "text", "body": "Matthew B. Crawford (né en 1965) Auteur majeur sur la valeur du geste, de l'attention et du savoir-faire."},
{"type": "text", "body": "Les sources ci-dessous constituent le socle documentaire de cet essai. Elles sont classées selon leur fonction dans l'argumentation : sources cardinales qui structurent la pensée, dialogues critiques et philosophiques qui l'enrichissent, sources techniques et scientifiques qui l'ancrent dans les faits, et sources institutionnelles qui documentent les mécanismes décrits."},

// ── Wake Lock ──────────────────────────────────────────────────────────────────
let wakeLock = null, wakeLockActive = false;
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return false;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => {
      wakeLockActive = false; updateWakeLockBtn();
      if (playing) acquireWakeLock();
    });
    wakeLockActive = true; updateWakeLockBtn(); return true;
  } catch(e) { return false; }
}
async function releaseWakeLock() {
  if (wakeLock) { await wakeLock.release(); wakeLock = null; }
  wakeLockActive = false; updateWakeLockBtn();
}
async function toggleWakeLock() {
  if (wakeLockActive) { await releaseWakeLock(); showStatus('Mise en veille réactivée.','info',2000); }
  else { const ok = await acquireWakeLock(); showStatus(ok?'Écran maintenu allumé.':'Wake Lock non supporté.',ok?'info':'warn',3000); }
}
function updateWakeLockBtn() {
  const btn = document.getElementById('btn-wakelock');
  if (!('wakeLock' in navigator)) { btn.className='unsupported'; return; }
  btn.className = wakeLockActive ? 'active' : '';
  btn.textContent = wakeLockActive ? '🔆 Veille OFF' : '🔆 Veille';
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState==='visible' && playing && !wakeLockActive) acquireWakeLock();
});

// ── Voix ──────────────────────────────────────────────────────────────────────
function loadVoices() {
  const all = synth.getVoices();
  if (!all.length) return false;
  voices = all;
  const sel = document.getElementById('voice-select');
  sel.innerHTML = '';
  all.forEach((v,i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = v.name + ' (' + v.lang + ')';
    sel.appendChild(opt);
  });
  const frIdx = all.findIndex(v => v.lang.startsWith('fr'));
  voiceIdx = frIdx >= 0 ? frIdx : 0;
  sel.value = voiceIdx;
  return true;
}
let voiceAttempts = 0;
function tryLoadVoices() {
  if (loadVoices()) return;
  if (voiceAttempts++ < 25) setTimeout(tryLoadVoices, 200);
  else showStatus('Aucune voix TTS détectée. Installez "Google Français" dans Paramètres → Accessibilité → Synthèse vocale.','warn');
}
synth.onvoiceschanged = tryLoadVoices;
tryLoadVoices();

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function badgeFor(t) {
  const labels = {chapter:'Chapitre', subchapter:'Section', section:'Partie', dialogue:'Dialogue', note:'Note', definition:'Définition'};
  if (!labels[t] || t==='text') return '';
  return `<span class="type-badge badge-${t}">${labels[t]}</span>`;
}
function displayText(seg) {
  if (seg.type === 'chapter' || seg.type === 'section') return esc(seg.title || '');
  if (seg.type === 'subchapter') {
    const t = seg.title ? `<strong>${esc(seg.title)}</strong>` : '';
    const b = seg.body ? esc(seg.body) : '';
    return t + (t && b ? ' — ' : '') + b;
  }
  return esc(seg.body || '');
}

// ── TTS : texte à lire ─────────────────────────────────────────────────────────

// Convertit un numéro de chapitre en lettres (1→"un", 2→"deux"…)
function numToFr(n) {
  const mots = ['','un','deux','trois','quatre','cinq','six','sept','huit','neuf',
    'dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf',
    'vingt','vingt-et-un','vingt-deux','vingt-trois','vingt-quatre','vingt-cinq'];
  return mots[n] || String(n);
}

// Extrait un titre court lisible pour un chapitre
// "Chapitre 1. LE CALCULATEUR SOUVERAIN. GÉNÉALOGIE DE L'ÉTALON-DONNÉE"
// → "Chapitre un — Le Calculateur Souverain"
function cleanChapterTitle(raw) {
  // Cherche "Chapitre N." ou "CHAPITRE N."
  const m = raw.match(/chapitre\s+(\d+)[\.\s]+(.+)/i);
  if (!m) return raw;
  const num = numToFr(parseInt(m[1]));
  // Prend seulement la première partie avant le second point ou tiret
  let subtitle = m[2].replace(/\.\s+.+$/, '').replace(/—.+$/, '').trim();
  // Convertit MAJUSCULES en Titre Normal
  subtitle = subtitle.charAt(0).toUpperCase() + subtitle.slice(1).toLowerCase();
  return `Chapitre ${num}. ${subtitle}`;
}

// Pour subchapter/section : le body commence souvent par une répétition du titre.
// Ex: title="1.1 L'Épave du Destin"  body="L'Épave du Destin : Anticythère (100 av. J.-C.) L'histoire..."
// On supprime le doublon en vérifiant si le début du body reprend les mots-clés du titre.
function deduplicateBody(title, body) {
  if (!title || !body) return body;
  // Extrait les mots significatifs du titre (sans numéro de section)
  const cleanTitle = title.replace(/^\d+[\.\d]*\s*/, '').trim();
  if (!cleanTitle) return body;
  // Prend les 4 premiers mots du titre nettoyé
  const titleWords = cleanTitle.toLowerCase().split(/\s+/).slice(0, 4).join(' ');
  const bodyStart = body.toLowerCase().slice(0, titleWords.length + 20);
  if (bodyStart.includes(titleWords.slice(0, Math.min(titleWords.length, 15)))) {
    // Trouve où finit le doublon : cherche le premier ":" ou la fin du titre dans le body
    const colonIdx = body.indexOf(':');
    const dotIdx = body.indexOf('.');
    // Cherche le premier séparateur après le titre répété
    const firstSep = Math.min(
      colonIdx > 0 ? colonIdx : Infinity,
      dotIdx > 50 ? dotIdx : Infinity
    );
    if (firstSep !== Infinity && firstSep < 120) {
      // Saute jusqu'après le premier séparateur suivi d'un espace
      const afterSep = body.indexOf(' ', firstSep);
      if (afterSep > 0 && afterSep < 150) return body.slice(afterSep + 1).trim();
    }
  }
  return body;
}

// Titre court pour subchapter/section : "1.1" → "Un point un", "2.3" → "Deux point trois"
function readableSubNum(title) {
  const m = title.match(/^(\d+)\.(\d+)/);
  if (!m) return '';
  return `${numToFr(parseInt(m[1]))} point ${numToFr(parseInt(m[2]))}`;
}

// Extrait la première phrase/titre du champ title (qui peut contenir du body en doublon)
function extractShortSubName(title) {
  let s = title.replace(/^\d+[\.\d]*\s*/, '').trim();
  // Coupe sur tiret cadratin ou parenthèse ouvrante
  s = s.replace(/\s+—\s+.+$/s, '').replace(/\(.+$/s, '').trim();
  // Si encore trop long (>55 chars), coupe au dernier espace avant 55
  if (s.length > 55) {
    const cut = s.lastIndexOf(' ', 55);
    if (cut > 20) s = s.slice(0, cut) + '…';
  }
  return s;
}

function getTTSText(seg) {
  if (seg.type === 'chapter') {
    const raw = seg.title || seg.body || '';
    if (!raw.trim()) return '';
    const clean = cleanChapterTitle(raw);
    // Pause avant/après grâce aux points de suspension
    return '… ' + clean + ' …';
  }

  if (seg.type === 'subchapter') {
    const rawTitle = seg.title || '';
    const rawBody  = seg.body  || '';
    // Titre court vocal : numéro + nom court (sans doublon body dans le titre)
    const subNum   = readableSubNum(rawTitle);
    const nameOnly = extractShortSubName(rawTitle);
    const spokenTitle = subNum ? `${subNum}, ${nameOnly}` : nameOnly;
    // Body nettoyé du doublon
    const cleanBody = deduplicateBody(rawTitle, rawBody);
    if (spokenTitle && cleanBody) return spokenTitle + '. ' + cleanBody;
    return spokenTitle || cleanBody;
  }

  if (seg.type === 'section') {
    const rawTitle = seg.title || '';
    const rawBody  = seg.body  || '';
    const cleanBody = deduplicateBody(rawTitle, rawBody);
    if (rawTitle && cleanBody) return rawTitle + '. ' + cleanBody;
    return rawTitle || cleanBody;
  }

  return seg.body || '';
}

function speak(i) {
  synth.cancel();
  if (i >= SEGMENTS.length) { playing=false; releaseWakeLock(); updateUI(); return; }
  if (synth.paused) synth.resume();
  
  const seg = SEGMENTS[i];
  const ttsText = getTTSText(seg);
  if (!ttsText.trim()) {
    // Skip truly empty segment (but NOT chapters — those are handled by getTTSText now)
    const nxt = i + 1;
    if (nxt < SEGMENTS.length) { idx=nxt; updateUI(); speak(nxt); }
    else { playing=false; releaseWakeLock(); updateUI(); }
    return;
  }

  const utt = new SpeechSynthesisUtterance(ttsText);
  utt.rate = rate;
  utt.lang = 'fr-FR';
  if (voices.length && voices[voiceIdx]) utt.voice = voices[voiceIdx];

  // Ajustements prosodiques par type
  if (seg.type === 'chapter') { utt.rate = Math.max(0.7, rate * 0.85); utt.pitch = 1.1; }
  else if (seg.type === 'subchapter') { utt.rate = Math.max(0.8, rate * 0.9); }
  else if (seg.type === 'note') { utt.rate = Math.min(1.4, rate * 1.05); utt.pitch = 0.95; }
  else if (seg.type === 'dialogue') { utt.pitch = 1.05; }

  utt.onend = () => {
    const nxt = i + 1;
    if (nxt < SEGMENTS.length) { idx=nxt; updateUI(); speak(nxt); }
    else { playing=false; releaseWakeLock(); updateUI(); }
  };
  utt.onerror = (e) => {
    if (e.error !== 'interrupted') { playing=false; releaseWakeLock(); updateUI(); }
  };
  idx = i;
  synth.speak(utt);
}

async function togglePlay() {
  if (playing) { synth.pause(); playing=false; await releaseWakeLock(); }
  else { playing=true; await acquireWakeLock(); speak(idx); }
  updateUI();
}
async function goStop() { synth.cancel(); playing=false; idx=0; await releaseWakeLock(); updateUI(); }
function goNext() { jumpTo(Math.min(idx+1, SEGMENTS.length-1)); }
function goPrev() { jumpTo(Math.max(idx-1, 0)); }
function jumpTo(i) { idx=i; if (playing) speak(i); else updateUI(); }

function setRate(r) {
  rate = r;
  document.querySelectorAll('.rate-btn').forEach(btn => {
    btn.className = 'rate-btn' + (parseFloat(btn.textContent)===r ? ' active' : '');
  });
}

// ── UI ─────────────────────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('counter').textContent = '§'+(idx+1)+' / '+SEGMENTS.length;
  const pct = Math.round(idx / Math.max(SEGMENTS.length-1,1) * 100);
  document.getElementById('progress-bar').style.width = pct+'%';

  document.querySelectorAll('.seg-item').forEach((el,i) => {
    const seg = SEGMENTS[i];
    el.className = 'seg-item seg-'+seg.type+(i===idx?(playing?' playing':' active'):'');
  });

  const btn = document.getElementById('btn-play');
  btn.textContent = playing ? '⏸' : '▶';
  btn.className   = 'ctrl-btn'+(playing?' active':'');

  const active = document.getElementById('p'+idx);
  if (active) active.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

let statusTimer = null;
function showStatus(msg, type, duration) {
  const el = document.getElementById('status-msg');
  el.textContent = msg; el.className='msg-'+type; el.style.display='block';
  if (statusTimer) clearTimeout(statusTimer);
  if (duration) statusTimer = setTimeout(()=>{ el.style.display='none'; }, duration);
}

updateWakeLockBtn();
updateUI();
</script>


<!-- ═══════════════════════════════════════════════════════
     AUDIO ENGINE v7 — Musique synchronisée + position mémorisée
     ═══════════════════════════════════════════════════════ -->

</style>

<div id="resume-banner">
  📖 Reprise possible au §<span id="resume-num">?</span>
  <div class="rb-btns">
    <button class="rb-btn" id="rb-yes">Reprendre ici</button>
    <button class="rb-btn" id="rb-no">Recommencer</button>
  </div>
</div>

<div id="audio-bar">
  <div class="vol-group">
    <span>🔊 Voix</span>
    <input class="vol-slider" type="range" id="vol-voice" min="0" max="1" step="0.05" value="1">
  </div>
  <div class="vol-group">
    <span>🎵 Musique</span>
    <input class="vol-slider" type="range" id="vol-music" min="0" max="1" step="0.05" value="0.22">
  </div>
</div>
<div id="music-status">musique.mp3 introuvable — placez le fichier à côté du HTML</div>

<script>
// ═══════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════
let _audioCtx    = null;
let _musicGain   = null;
let _masterGain  = null;
let _musicSrc    = null;
let _musicBuf    = null;
let _musicReady  = false;
let _musicVol    = 0.22;
let _voiceVol    = 1.0;

function _initAudio() {
  if (_audioCtx) return;
  _audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
  _masterGain = _audioCtx.createGain(); _masterGain.gain.value = 1;
  _musicGain  = _audioCtx.createGain(); _musicGain.gain.value  = 0; // démarre silencieux
  _masterGain.connect(_audioCtx.destination);
  _musicGain.connect(_masterGain);
  _loadMusic();
}

function _loadMusic() {
  fetch('musique.mp3')
    .then(r => { if (!r.ok) throw new Error('404'); return r.arrayBuffer(); })
    .then(ab => _audioCtx.decodeAudioData(ab))
    .then(buf => { _musicBuf = buf; _musicReady = true; })
    .catch(() => { document.getElementById('music-status').style.display = 'block'; });
}

function _startMusic() {
  if (!_musicReady || !_audioCtx) return;
  _stopMusic();
  _musicSrc = _audioCtx.createBufferSource();
  _musicSrc.buffer = _musicBuf;
  _musicSrc.loop   = true;
  _musicSrc.connect(_musicGain);
  _musicSrc.start(0);
  // Fade in
  _musicGain.gain.cancelScheduledValues(_audioCtx.currentTime);
  _musicGain.gain.setValueAtTime(0, _audioCtx.currentTime);
  _musicGain.gain.linearRampToValueAtTime(_musicVol, _audioCtx.currentTime + 1.5);
}

function _stopMusic() {
  if (_musicSrc) { try { _musicSrc.stop(); } catch(e) {} _musicSrc = null; }
}

function _fadeOutMusic(cb) {
  if (!_musicGain || !_audioCtx) { if (cb) cb(); return; }
  _musicGain.gain.cancelScheduledValues(_audioCtx.currentTime);
  _musicGain.gain.setValueAtTime(_musicGain.gain.value, _audioCtx.currentTime);
  _musicGain.gain.linearRampToValueAtTime(0, _audioCtx.currentTime + 0.8);
  setTimeout(() => { _stopMusic(); if (cb) cb(); }, 900);
}

// Sliders
document.getElementById('vol-music').addEventListener('input', function() {
  _musicVol = parseFloat(this.value);
  if (_musicGain && _audioCtx) _musicGain.gain.value = _musicVol;
});
document.getElementById('vol-voice').addEventListener('input', function() {
  _voiceVol = parseFloat(this.value);
});

// ═══════════════════════════════════════════════════════
// POSITION MÉMORISÉE
// ═══════════════════════════════════════════════════════
const LS_KEY = 'cds_t1_v7_pos';

function _savePos() { try { localStorage.setItem(LS_KEY, idx); } catch(e) {} }
function _clearPos() { try { localStorage.removeItem(LS_KEY); } catch(e) {} }

function _checkSavedPos() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved !== null && parseInt(saved) > 0) {
      const si = parseInt(saved);
      document.getElementById('resume-num').textContent = si + 1;
      document.getElementById('resume-banner').style.display = 'block';
      document.getElementById('rb-yes').onclick = () => {
        idx = si;
        document.getElementById('resume-banner').style.display = 'none';
        updateUI();
      };
      document.getElementById('rb-no').onclick = () => {
        _clearPos();
        document.getElementById('resume-banner').style.display = 'none';
      };
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// PATCH DES CONTRÔLES (play/pause/stop)
// ═══════════════════════════════════════════════════════
// On wrape les fonctions existantes du v6

const _v6togglePlay = window.togglePlay;
const _v6goStop     = window.goStop;
const _v6speak      = window.speak;

// Patch speak pour sauvegarder la position à chaque segment
window.speak = function(i) {
  _v6speak(i);
  // Sauvegarder après chaque segment lancé
  setTimeout(() => _savePos(), 100);
};

window.togglePlay = async function() {
  _initAudio();
  if (playing) {
    // Pause
    synth.pause();
    playing = false;
    _fadeOutMusic();
    await releaseWakeLock();
  } else {
    // Play
    playing = true;
    await acquireWakeLock();
    _startMusic();
    if (synth.paused) synth.resume();
    else speak(idx);
  }
  updateUI();
};

window.goStop = async function() {
  synth.cancel();
  playing = false;
  idx = 0;
  _fadeOutMusic();
  _clearPos();
  await releaseWakeLock();
  updateUI();
};

// Fin du stop → musique s'arrête aussi à la fin naturelle de la lecture
const _origSpeak = window.speak;
// Remplace onend dans speak pour couper la musique en fin de livre
// (le v6 gère déjà le onend, on intercepte en fin de SEGMENTS)
// Simple : on check dans updateUI si idx === dernier et !playing
const _origUpdateUI = window.updateUI;
window.updateUI = function() {
  _origUpdateUI();
  if (!playing && idx === SEGMENTS.length - 1) {
    _fadeOutMusic();
    _clearPos();
  }
};

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
_checkSavedPos();
</script>
